<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHNO INFODZ - متجرك الإلكتروني للحلول والمعدات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .admin-only { display: none; }
        .is-admin .admin-only { display: flex; }
        .product-card:hover { transform: translateY(-5px); }
        .category-pill:hover { background-color: #1e40af; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 onclick="handleAdminClick()" class="text-2xl font-black text-blue-800 cursor-pointer select-none">TECHNO INFODZ</h1>
                <div class="hidden md:block h-8 w-px bg-gray-200 mx-2"></div>
                <p class="hidden md:block text-xs text-gray-500 font-bold">الحلول التقنية والمعدات التكنولوجية المتكاملة</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="showAddModal()" class="admin-only bg-yellow-500 text-blue-900 px-4 py-2 rounded-lg font-bold text-sm shadow hover:bg-yellow-400 transition-all">
                    <i class="fas fa-plus-circle ml-1"></i> إضافة منتج
                </button>
                <a href="tel:0666636473" class="bg-blue-800 text-white px-5 py-2 rounded-full font-bold text-sm flex items-center gap-2 hover:bg-blue-700">
                    <i class="fas fa-phone-alt"></i> 0666636473
                </a>
            </div>
        </div>
    </nav>

    <section class="bg-gradient-to-r from-blue-900 to-blue-700 text-white py-12 px-4 text-center">
        <h2 class="text-3xl font-bold mb-4 text-yellow-400">مرحباً بك في TECHNO INFODZ</h2>
        <p class="text-blue-100 max-w-2xl mx-auto text-lg italic">نحن نوفر لك أفضل البرمجيات (PME PRO, Hyper Pro) وأحدث عتاد الإعلام الآلي HENEX و SMART.</p>
    </section>

    <div class="container mx-auto px-4 py-8">
        <div class="flex flex-wrap gap-3 justify-center mb-10" id="category-filters">
            <button class="category-pill px-6 py-2 rounded-full border border-blue-800 text-blue-800 font-bold transition-all bg-white shadow-sm">الكل</button>
            <button class="category-pill px-6 py-2 rounded-full border border-gray-300 text-gray-600 font-bold transition-all bg-white">برمجيات</button>
            <button class="category-pill px-6 py-2 rounded-full border border-gray-300 text-gray-600 font-bold transition-all bg-white">عتاد إعلام آلي</button>
            <button class="category-pill px-6 py-2 rounded-full border border-gray-300 text-gray-600 font-bold transition-all bg-white">كاميرات مراقبة</button>
        </div>

        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            </div>
    </div>

    <script>
        const GITHUB_USER = 'samirinfodz-boop';
        const REPO_NAME = 'technoinfodz-official';
        const FILE_PATH = 'products.json';
        let GITHUB_TOKEN = localStorage.getItem('gh_token') || '';
        let products = [];
        let clickCount = 0;

        // تفعيل وضع الأدمن
        function handleAdminClick() {
            clickCount++;
            if (clickCount === 5) {
                const pass = prompt("أدخل رمز الوصول (TOKEN):", GITHUB_TOKEN);
                if (pass) {
                    GITHUB_TOKEN = pass;
                    localStorage.setItem('gh_token', pass);
                    location.reload();
                }
                clickCount = 0;
            }
        }
        if (GITHUB_TOKEN) document.body.classList.add('is-admin');

        // جلب المنتجات
        async function loadProducts() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${FILE_PATH}?v=${new Date().getTime()}`);
                if (response.ok) {
                    products = await response.json();
                    renderProducts();
                }
            } catch (e) { console.error(e); }
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map((p, index) => `
                <div class="product-card bg-white rounded-2xl overflow-hidden shadow-lg border border-gray-100 transition-all flex flex-col h-full relative">
                    <div class="h-48 bg-gray-50 flex items-center justify-center p-4">
                        <img src="${p.image || 'https://via.placeholder.com/200?text=TechnoInfo'}" class="max-h-full max-w-full object-contain">
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded w-fit mb-2">${p.category}</span>
                        <h3 class="font-bold text-gray-800 text-lg mb-2">${p.name}</h3>
                        <div class="mt-auto flex items-center justify-between">
                            <span class="text-xl font-black text-green-600">${p.price} <small class="text-xs">دج</small></span>
                            <a href="https://wa.me/213666636473?text=طلب منتج: ${p.name}" class="bg-blue-100 text-blue-800 p-2 rounded-lg hover:bg-blue-800 hover:text-white transition-colors">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                        </div>
                        <div class="admin-only mt-4 pt-4 border-t flex gap-2">
                            <button onclick="deleteProduct(${index})" class="flex-1 bg-red-100 text-red-600 py-2 rounded-lg font-bold hover:bg-red-600 hover:text-white">حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // إضافة منتج جديد
        async function showAddModal() {
            const name = prompt("اسم المنتج:");
            const price = prompt("السعر:");
            const category = prompt("الصنف:");
            const image = prompt("رابط الصورة:");
            if (name && price) {
                products.push({ name, price, category, image });
                await saveToGitHub("Add " + name);
            }
        }

        // حذف منتج
        async function deleteProduct(index) {
            if (confirm("حذف هذا المنتج؟")) {
                products.splice(index, 1);
                await saveToGitHub("Delete product");
            }
        }

        // محرك الحفظ في GitHub
        async function saveToGitHub(msg) {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                const data = await res.json();
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, content, sha: data.sha })
                });
                if (putRes.ok) { alert("تم التحديث!"); location.reload(); }
            } catch (e) { alert("خطأ في الاتصال بـ GitHub"); }
        }

        loadProducts();
    </script>
</body>
</html>
