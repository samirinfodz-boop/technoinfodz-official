<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TECHNO INFODZ — حلول برمجية متكاملة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-deep:    #090d14;
      --bg-panel:   #0e1520;
      --bg-card:    #121b2a;
      --accent:     #00d4ff;
      --accent2:    #0066ff;
      --accent3:    #7b2fff;
      --text-dim:   #5a7a99;
      --text-mid:   #8fb0cc;
      --text-main:  #cce0f5;
      --text-bright:#f0f8ff;
      --green:      #00ff9d;
      --warn:       #ff6b35;
      --border:     rgba(0,212,255,.12);
      --glow:       0 0 40px rgba(0,212,255,.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      overflow-x: hidden;
    }
    /* ── AMBIENT EFFECTS ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(120px); opacity: .18; }
    .orb-1 { width: 600px; height: 600px; background: var(--accent2); top: -200px; right: -200px; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent3); bottom: 10%; left: -150px; }

    /* ── UI COMPONENTS ── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: .5rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      color: #fff; padding: .75rem 1.75rem; border-radius: 8px;
      font-weight: 600; cursor: pointer; border: none; transition: 0.3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,102,255,.4); }
    .glass-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; transition: 0.3s; position: relative;
    }
    .glass-card:hover { transform: translateY(-6px); box-shadow: var(--glow); border-color: rgba(0,212,255,.3); }

    /* ── ADMIN & UTILS ── */
    #admin-bar {
      display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: linear-gradient(90deg, var(--accent3), var(--accent2));
      color: #fff; padding: .5rem 1.5rem; align-items: center; justify-content: space-between; font-size: 0.8rem;
    }
    #admin-bar.visible { display: flex; }
    .price-tag { color: var(--accent); font-weight: 700; font-size: 1.2rem; font-family: 'Space Mono', monospace; }
    #toast {
      position: fixed; top: 5rem; right: 1.5rem; z-index: 200;
      background: var(--bg-card); border: 1px solid var(--green);
      color: var(--green); padding: .75rem 1.25rem; border-radius: 8px;
      opacity: 0; transition: 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(10px); }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div id="admin-bar">
  <span>⚡ لوحة مدير TECHNO INFODZ</span>
  <div style="display:flex;gap:.5rem;">
    <button onclick="openAdminModal()" style="background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:4px; border:none; color:white; cursor:pointer;">➕ إضافة منتج</button>
    <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer;">خروج</button>
  </div>
</div>

<div id="toast">✓ تم التحديث</div>

<nav id="navbar" style="position:fixed; top:0; width:100%; padding:1rem 2rem; display:flex; justify-content:space-between; z-index:100; background:rgba(9,13,20,0.8); backdrop-filter:blur(10px);">
  <a href="#" style="color:var(--accent); font-weight:bold; text-decoration:none;">TECHNO<span style="color:var(--text-dim);">INFODZ</span></a>
  <div style="display:flex; gap:1.5rem;">
    <a href="#products" style="color:var(--text-mid); text-decoration:none;">البرمجيات</a>
    <a href="#contact" style="color:var(--text-mid); text-decoration:none;">تواصل معنا</a>
  </div>
</nav>

<section id="hero" style="min-height:80vh; display:flex; align-items:center; justify-content:center; text-align:center; padding-top:100px;">
  <div style="max-width:800px; padding:0 1.5rem;">
    <h1 style="font-size: clamp(2.5rem, 5vw, 4rem); font-weight:700; margin-bottom:1rem;">حلول برمجية <span style="color:var(--accent);">موثوقة</span></h1>
    <p style="color:var(--text-mid); margin-bottom:2rem;">الرائدة في حلول البرمجيات والدعم الفني في الجزائر. نوفر أنظمة Pme pro و Hyper pro و Pos المصممة لنمو أعمالك.</p>
    <a href="https://wa.me/213666636473" class="btn-primary"><span>💬 استشارة مجانية عبر واتساب</span></a>
  </div>
</section>

<section id="products" style="padding:4rem 1.5rem;">
  <div style="max-width:1200px; margin:auto;">
    <h2 style="margin-bottom:2rem; font-size:2rem;">برامجنا المتاحة</h2>
    <div id="products-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:1.5rem;">
      </div>
  </div>
</section>

<div id="admin-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:300; align-items:center; justify-content:center;">
  <div class="glass-card" style="padding:2rem; width:90%; max-width:400px; background:var(--bg-panel);">
    <h3 style="margin-bottom:1rem;">إضافة / تعديل منتج</h3>
    <input id="p-name" type="text" placeholder="اسم البرنامج" style="width:100%; padding:10px; margin-bottom:10px; background:#1a2433; border:1px solid var(--border); color:white;">
    <input id="p-price" type="text" placeholder="السعر (مثلاً: 25,000 دج)" style="width:100%; padding:10px; margin-bottom:10px; background:#1a2433; border:1px solid var(--border); color:white;">
    <textarea id="p-desc" placeholder="وصف البرنامج" style="width:100%; padding:10px; margin-bottom:10px; background:#1a2433; border:1px solid var(--border); color:white;"></textarea>
    <div style="display:flex; gap:10px;">
      <button onclick="saveProduct()" class="btn-primary" style="flex:1; justify-content:center;">حفظ</button>
      <button onclick="closeAdminModal()" style="flex:1; background:none; border:1px solid var(--border); color:white; cursor:pointer;">إلغاء</button>
    </div>
  </div>
</div>

<script>
// 1. إعداد SUPABASE
const supabaseUrl = 'https://ysouygwphowpfltzhbpx.supabase.co';
const supabaseKey = 'sb_publishable_fuhMop0xxY3VrJ-jSvsKAQ_QeRm2y1W_KEY'; // ضع مفتاحك هنا
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// 2. جلب المنتجات
async function loadProducts() {
  const { data: products, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
  if (error) return console.error(error);

  const grid = document.getElementById('products-grid');
  grid.innerHTML = products.map(p => `
    <div class="glass-card" style="padding:2rem;">
      <div style="font-size:2rem; margin-bottom:1rem;">📦</div>
      <h3 style="font-size:1.4rem; margin-bottom:0.5rem;">${p.name}</h3>
      <p style="color:var(--text-mid); font-size:0.9rem; margin-bottom:1.5rem;">${p.description || ''}</p>
      <div class="price-tag">${p.price || 'تواصل معنا'}</div>
      ${localStorage.getItem('is_admin') ? `<button onclick="deleteProduct('${p.id}')" style="margin-top:10px; color:var(--warn); background:none; border:none; cursor:pointer; font-size:0.8rem;">🗑️ حذف</button>` : ''}
    </div>
  `).join('');
}

// 3. وظائف الإدارة
function checkAdmin() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('login') === 'admin_techno') { // ادخل عبر رابط: ?login=admin_techno
    localStorage.setItem('is_admin', 'true');
    window.history.replaceState({}, '', window.location.pathname);
  }
  if (localStorage.getItem('is_admin')) {
    document.getElementById('admin-bar').classList.add('visible');
    document.body.style.paddingTop = '40px';
  }
}

async function saveProduct() {
  const name = document.getElementById('p-name').value;
  const price = document.getElementById('p-price').value;
  const description = document.getElementById('p-desc').value;

  const { error } = await _supabase.from('products').insert([{ name, price, description }]);
  if (error) alert(error.message);
  else {
    showToast("✓ تم الحفظ");
    closeAdminModal();
    loadProducts();
  }
}

async function deleteProduct(id) {
  if (confirm("حذف هذا المنتج؟")) {
    await _supabase.from('products').delete().eq('id', id);
    loadProducts();
  }
}

function openAdminModal() { document.getElementById('admin-modal').style.display = 'flex'; }
function closeAdminModal() { document.getElementById('admin-modal').style.display = 'none'; }
function logout() { localStorage.removeItem('is_admin'); location.reload(); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

// البدء
checkAdmin();
loadProducts();
</script>
</body>
</html>
